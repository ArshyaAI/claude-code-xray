# ─── Adapter Config ──────────────────────────────────────────────────────────

adapters:
  claude_local:
    effort_key: "effort"
    values: ["low", "medium", "high", "max"]
    permission_flag: "dangerouslySkipPermissions"

  codex_local:
    effort_key: "modelReasoningEffort"
    values: ["minimal", "low", "medium", "high", "xhigh"]
    permission_flag: "dangerouslyBypassApprovalsAndSandbox"

  gemini_local:
    effort_key: "thinking_level"
    values: ["minimal", "low", "medium", "high"]

# ─── Routing Recommendations ────────────────────────────────────────────────

routing_guidance:
  judgment_roles:
    models: ["claude-opus-4-6"]
    effort: "max"
    roles: ["ceo", "auditor", "strategist"]
    note: "Irreversible decisions require deepest reasoning"

  strong_judgment:
    models: ["claude-opus-4-6"]
    effort: "high"
    roles: ["cto", "memory_curator"]
    note: "Important reasoning but not existential"

  execution_roles:
    models: ["claude-sonnet-4-6"]
    roles: ["builder", "qa", "evaluator"]
    note: "Speed matters, quality gated by review"

  cross_model:
    models: ["gpt-5.3-codex", "gpt-5.4"]
    roles: ["reviewer", "analyst", "critic"]
    note: "Prevents groupthink from all-Claude roster"

  budget_parallel:
    models: ["gpt-5.4-mini", "claude-haiku-4-5", "gpt-5.4-nano"]
    roles: ["explorer"]
    note: "Experiments are throwaway — use cheapest viable"

# ─── Budget Context ─────────────────────────────────────────────────────────

budget:
  total_monthly_usd: 400
  sources:
    - "Claude Max 20x subscription"
    - "ChatGPT Pro subscription"
  allocation:
    champion_lane: 0.60 # agents 1-4, 7-8
    evolution_lane: 0.16 # agents 5-6, 9, 12
    governance: 0.24 # agents 10-11, B1-B3
