name: Test

on:
  push:
    branches: [main, factory/**]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx tsc --noEmit
      - run: npx tsc
      - run: node --test dist/orchestrator/__tests__/tasks.test.js dist/orchestrator/__tests__/config.test.js dist/promoter/__tests__/demotion.test.js dist/orchestrator/__tests__/archetypes.test.js
